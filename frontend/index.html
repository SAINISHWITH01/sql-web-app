<!DOCTYPE html>
<html>
<head>
  <title>SQL Web App</title>
</head>
<body>

  <h2>SQL Web App 🚀</h2>

  <h3>Connection Details</h3>

  <label>Username:</label><br>
  <input type="text" id="username" value="KUFPEC_REPORT_USER"><br><br>

  <label>Password:</label><br>
  <input type="password" id="password" value="Welcome@1088"><br><br>

  <label>Fusion URL:</label><br>
  <input type="text" id="baseUrl" value="https://iabhbn-dev1.fa.ocs.oraclecloud.com"><br><br>

  <h3>SQL Query</h3>

  <textarea id="query" rows="6" cols="60">
SELECT * FROM PER_ALL_PEOPLE_F WHERE ROWNUM < 5
  </textarea>

  <br><br>

  <button onclick="runQuery()">Run Query</button>

  <h3>Result:</h3>
  <pre id="result"></pre>

  <script>
    async function runQuery() {
      const query = document.getElementById("query").value;
      const user = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const baseUrl = document.getElementById("baseUrl").value;

      try {
        const res = await fetch("http://localhost:4000/execute", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            query,
            user,
            password,
            baseUrl
          })
        });

        const text = await res.text();

        document.getElementById("result").innerText = text;

      } catch (error) {
        document.getElementById("result").innerText =
          "Error: " + error.message;
      }
    }
  </script>

</body>
</html>
